<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Văn phòng số – eOffice Prototype</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/nav.css">
</head>

<body>

  <!-- ── APP SHELL ─────────────────────────────────────────────
       Sidebar được render một lần ở đây (shared component).
       Mỗi screen chỉ cần chứa phần .cw (content wrapper).
  ──────────────────────────────────────────────────────────── -->
  <div class="app-shell">

    <!-- Shared Sidebar (loaded once, stays mounted) -->
    <div id="sidebar-host"></div>

    <!-- Screen content area -->
    <div id="screen-container"></div>

  </div>

  <!-- ── NAVIGATION BAR (Prototype Demo) ─────────────────────── -->
  <div class="flow-nav">
    <span class="fn-grp-lbl">VB ĐẾN</span>
    <button class="fn-btn on" id="nb-s1" onclick="goScreen('s1')">① Danh sách</button>
    <button class="fn-btn" id="nb-s2" onclick="goScreen('s2')">② Tiếp nhận</button>
    <button class="fn-btn" id="nb-s3" onclick="goScreen('s3')">③ Chờ chỉ đạo</button>
    <button class="fn-btn" id="nb-s4" onclick="goScreen('s4')">④ BGĐ chỉ đạo</button>
    <button class="fn-btn" id="nb-s7" onclick="goScreen('s7')">⑤ TK thiết lập luồng</button>
    <button class="fn-btn" id="nb-s5" onclick="goScreen('s5')">⑥ Đang xử lý</button>
    <button class="fn-btn" id="nb-s6" onclick="goScreen('s6')">⑦ Hoàn thành</button>
    <div class="fn-sep"></div>
    <span class="fn-grp-lbl">VB ĐI</span>
    <button class="fn-btn" id="nb-s8" onclick="goScreen('s8')">⑧ Danh sách</button>
    <button class="fn-btn" id="nb-s9" onclick="goScreen('s9')">⑨ Soạn thảo</button>
    <button class="fn-btn" id="nb-s10" onclick="goScreen('s10')">⑩ Duyệt song song</button>
    <button class="fn-btn" id="nb-s11" onclick="goScreen('s11')">⑪ GĐ ký số</button>
    <button class="fn-btn" id="nb-s12" onclick="goScreen('s12')">⑫ Cấp số &amp; Ban hành</button>
    <button class="fn-btn" id="nb-s13" onclick="goScreen('s13')">⑬ Đã ban hành</button>
    <div class="fn-sep"></div>
    <span class="fn-grp-lbl">NỘI BỘ</span>
    <button class="fn-btn" id="nb-s14" onclick="goScreen('s14')">⑭ Danh sách</button>
    <button class="fn-btn" id="nb-s15" onclick="goScreen('s15')">⑮ Tạo mới</button>
    <div class="fn-sep"></div>
    <span class="fn-grp-lbl">HỒ SƠ</span>
    <button class="fn-btn" id="nb-s16" onclick="goScreen('s16')">⑯ Danh sách</button>
    <button class="fn-btn" id="nb-s17" onclick="goScreen('s17')">⑰ Tạo hồ sơ</button>
    <button class="fn-btn" id="nb-s18" onclick="goScreen('s18')">⑱ Chi tiết</button>
    <button class="fn-btn" id="nb-s19" onclick="goScreen('s19')">⑲ Nộp lưu</button>
    <div class="fn-sep"></div>
    <span class="fn-grp-lbl">SỔ &amp; BC</span>
    <button class="fn-btn" id="nb-s20" onclick="goScreen('s20')">⑳ Sổ đăng ký</button>
    <button class="fn-btn" id="nb-s21" onclick="goScreen('s21')">㉑ Cấu hình sổ</button>
    <button class="fn-btn" id="nb-s22" onclick="goScreen('s22')">㉒ Báo cáo</button>
  </div>

  <script src="assets/js/app.js"></script>
</body>

</html>
